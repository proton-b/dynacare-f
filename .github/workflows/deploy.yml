# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            cd /root/workspace/dynacare-sec-v2/dynacare-f
            git pull origin master
            npm install
            pm2 restart 36

      - name: Discord Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "✅ **Deployment Successful**\nBranch: `master`\nCommit: `${{ github.sha }}`\nBy: `${{ github.actor }}`"}' \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Discord Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "❌ **Deployment Failed**\nBranch: `master`\nCommit: `${{ github.sha }}`\nBy: `${{ github.actor }}`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK }}
